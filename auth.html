<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Compte · J-Core 2000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Flash feedback -->
<div id="sf" aria-hidden="true"></div>

<!-- Navigation globale (retour + thème) -->
<div class="global-nav">
  <button class="nav-btn back-btn" id="global-back" aria-label="Retour">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn theme-btn" id="theme-toggle" aria-label="Changer le thème">
    <span id="theme-icon">☀️</span>
  </button>
</div>

<div id="app">

  <div class="screen-title">Compte</div>
  <div class="screen-sub">Sauvegarde ta progression sur tous tes appareils</div>

  <div id="auth-form-wrap">
    <div class="auth-tabs">
      <button class="auth-tab active" id="auth-tab-login" data-mode="login">Connexion</button>
      <button class="auth-tab" id="auth-tab-signup" data-mode="signup">Créer un compte</button>
    </div>

    <div class="auth-field hidden" id="auth-username-field">
      <label for="auth-username">Pseudo</label>
      <input class="auth-input" id="auth-username" type="text" maxlength="20" autocomplete="username" placeholder="Ton pseudo dans le classement">
    </div>
    <div class="auth-field">
      <label for="auth-email">Email</label>
      <input class="auth-input" id="auth-email" type="email" autocomplete="email" placeholder="toi@exemple.com">
    </div>
    <div class="auth-field">
      <label for="auth-password">Mot de passe</label>
      <input class="auth-input" id="auth-password" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <div class="auth-msg hidden" id="auth-msg"></div>

    <button class="btn-primary" id="btn-auth-submit">Se connecter</button>
    <a class="btn-ghost btn-full" id="btn-auth-guest" href="index.html">Continuer sans compte</a>
  </div>

  <div class="hidden" id="auth-profile-wrap">
    <div class="profile-card">
      <span class="profile-icon">👤</span>
      <div class="profile-name" id="profile-username">—</div>
      <div class="profile-sub" id="profile-email">—</div>
    </div>
    <button class="btn-ghost btn-full" id="btn-auth-logout">Déconnexion</button>
  </div>

</div><!-- /#app -->

<!-- Backend (comptes + sync + classement) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>

<!-- Données (variables globales JS) -->
<script src="data/mots_1.json"></script>
<script src="data/mots_2.json"></script>
<script src="data/mots_3.json"></script>
<script src="data/mots_4.json"></script>
<script src="srs.js"></script>
<script src="cloud.js"></script>
<script src="core.js"></script>
<script src="page-auth.js"></script>
</body>
</html>
