<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Admin · J-Core 2000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Flash feedback -->
<div id="sf" aria-hidden="true"></div>

<!-- Navigation globale (retour + thème) -->
<div class="global-nav">
  <button class="nav-btn back-btn" id="global-back" aria-label="Retour">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn theme-btn" id="theme-toggle" aria-label="Changer le thème">
    <span id="theme-icon">☀️</span>
  </button>
</div>

<div id="app">

  <div class="screen-title">Admin</div>
  <div class="screen-sub">Gestion des comptes &amp; de la progression</div>

  <!-- Visible uniquement si non-admin (sécurité réelle = côté serveur, ceci est juste l'UX) -->
  <div class="hidden" id="admin-denied">
    <div class="auth-msg">Accès refusé — réservé aux comptes administrateur.</div>
    <a class="btn-ghost btn-full" href="index.html" style="margin-top:10px;">Retour au menu</a>
  </div>

  <div class="hidden" id="admin-wrap">

    <!-- Bandeau stats globales, toujours visible en haut -->
    <div class="anki-stats" id="admin-stats-row">
      <div class="anki-stat"><span class="as-num" id="ast-total">—</span><span class="as-lbl">Joueurs</span></div>
      <div class="anki-stat"><span class="as-num" id="ast-active">—</span><span class="as-lbl">Actifs 7j</span></div>
      <div class="anki-stat"><span class="as-num" id="ast-points">—</span><span class="as-lbl">Points cumulés</span></div>
      <div class="anki-stat"><span class="as-num" id="ast-rebirths">—</span><span class="as-lbl">Rebirths</span></div>
      <div class="anki-stat"><span class="as-num" id="ast-banned">—</span><span class="as-lbl">Bannis</span></div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="admin-tab-players">Joueurs</button>
      <button class="auth-tab" id="admin-tab-leaderboard">Classement</button>
      <button class="auth-tab" id="admin-tab-log">Journal</button>
    </div>

    <!-- ─── Onglet Joueurs ─── -->
    <div id="admin-panel-players">
      <div style="margin-bottom:10px;">
        <input class="search-input" id="admin-search" type="text" placeholder="Filtrer par pseudo ou email…">
      </div>
      <div class="list-count" id="admin-count">—</div>

      <div class="word-list" id="admin-list"></div>
    </div>

    <!-- ─── Onglet Classement ─── -->
    <div class="hidden" id="admin-panel-leaderboard">
      <div class="auth-tabs">
        <button class="auth-tab active" id="admin-lb-all">Général</button>
        <button class="auth-tab" id="admin-lb-week">Semaine</button>
        <button class="auth-tab" id="admin-lb-streak">Streak</button>
      </div>
      <div class="lb-list" id="admin-lb-list"></div>
    </div>

    <!-- ─── Onglet Journal ─── -->
    <div class="hidden" id="admin-panel-log">
      <div class="list-count" id="admin-log-count">—</div>
      <div class="word-list" id="admin-log-list"></div>
    </div>

  </div>

</div><!-- /#app -->

<!-- ─── Modal édition joueur ─── -->
<div class="modal-overlay hidden" id="admin-edit-modal">
  <div class="modal-box" style="text-align:left; max-width:360px;">
    <div class="modal-title" id="admin-edit-title">Modifier le joueur</div>

    <div class="auth-field">
      <label for="admin-f-username">Pseudo</label>
      <input class="auth-input" id="admin-f-username" type="text" maxlength="20">
    </div>
    <div class="auth-field">
      <label for="admin-f-permtotal">Points (rang actuel)</label>
      <input class="auth-input" id="admin-f-permtotal" type="number" min="0">
    </div>
    <div class="auth-field">
      <label for="admin-f-rebirths">Rebirths</label>
      <input class="auth-input" id="admin-f-rebirths" type="number" min="0">
    </div>
    <div class="auth-field">
      <label for="admin-f-lifetime">Total à vie</label>
      <input class="auth-input" id="admin-f-lifetime" type="number" min="0">
    </div>
    <div class="auth-field">
      <label for="admin-f-streak">Day streak</label>
      <input class="auth-input" id="admin-f-streak" type="number" min="0">
    </div>
    <div class="opt-row">
      <div><span class="or-label">Administrateur</span><span class="or-sub">Accès à cet écran</span></div>
      <button class="toggle" id="admin-f-isadmin" type="button" aria-label="Statut admin"></button>
    </div>
    <div class="opt-row" style="margin-bottom:18px;">
      <div><span class="or-label">Banni</span><span class="or-sub">Empêche la connexion</span></div>
      <button class="toggle" id="admin-f-banned" type="button" aria-label="Statut banni"></button>
    </div>

    <button class="btn-ghost btn-full" id="admin-srs-toggle" type="button" style="margin-bottom:14px;">📊 Voir le détail SRS</button>
    <div class="hidden" id="admin-srs-detail"></div>

    <div class="auth-msg hidden" id="admin-edit-msg"></div>

    <div class="modal-actions">
      <button class="btn-primary" id="admin-edit-save">Enregistrer</button>
      <button class="btn-ghost" id="admin-edit-delete">🗑️ Supprimer ce compte</button>
      <button class="btn-ghost" id="admin-edit-cancel">Annuler</button>
    </div>
  </div>
</div>

<!-- Backend (comptes + sync + classement) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>

<!-- Données (variables globales JS) — nécessaires pour calculer le
     détail SRS d'un joueur (admin_get_player_srs ne renvoie que les
     ids touchés, il faut la liste complète pour les stats par mot). -->
<script src="data/mots_1.json"></script>
<script src="data/mots_2.json"></script>
<script src="data/mots_3.json"></script>
<script src="data/mots_4.json"></script>
<script src="srs.js"></script>
<script src="cloud.js"></script>
<script src="core.js"></script>
<script src="page-admin.js"></script>
</body>
</html>
