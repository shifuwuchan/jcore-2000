<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Vocabulaire · Admin · J-Core 2000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Flash feedback -->
<div id="sf" aria-hidden="true"></div>

<!-- Navigation globale (retour + thème) -->
<div class="global-nav">
  <button class="nav-btn back-btn" id="global-back" aria-label="Retour">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn theme-btn" id="theme-toggle" aria-label="Changer le thème">
    <span id="theme-icon">☀️</span>
  </button>
</div>

<div id="app">

  <div class="screen-title">Vocabulaire</div>
  <div class="screen-sub">Modifier, ajouter ou supprimer un mot du Core 2000</div>

  <!-- Visible uniquement si non-admin (sécurité réelle = côté serveur) -->
  <div class="hidden" id="wle-denied">
    <div class="auth-msg">Accès refusé — réservé aux comptes administrateur.</div>
    <a class="btn-ghost btn-full" href="index.html" style="margin-top:10px;">Retour au menu</a>
  </div>

  <div class="hidden" id="wle-wrap">

    <div class="auth-tabs">
      <button class="auth-tab active" id="wle-tab-1" data-level="1">1-500</button>
      <button class="auth-tab" id="wle-tab-2" data-level="2">501-1000</button>
      <button class="auth-tab" id="wle-tab-3" data-level="3">1001-1500</button>
      <button class="auth-tab" id="wle-tab-4" data-level="4">1501-2000</button>
    </div>

    <button class="btn-primary btn-full" id="wle-add-btn" style="margin-bottom:14px;">➕ Ajouter un mot</button>

    <input class="search-input" id="wle-search" type="text" placeholder="Kanji, kana ou traduction…" autocomplete="off">
    <div class="list-count" id="wle-count"></div>
    <div class="word-list" id="wle-list"></div>

  </div>

</div><!-- /#app -->

<!-- ─── Modal édition / création mot ─── -->
<div class="modal-overlay hidden" id="wle-modal">
  <div class="modal-box" style="text-align:left; max-width:380px;">
    <div class="modal-title" id="wle-modal-title">Modifier le mot</div>

    <div class="auth-field">
      <label for="wle-f-id">Identifiant (clé SRS — ne pas modifier après coup)</label>
      <input class="auth-input" id="wle-f-id" type="text" placeholder="ex: c1_501" maxlength="20">
    </div>
    <div class="auth-field">
      <label for="wle-f-kanji">Kanji</label>
      <input class="auth-input" id="wle-f-kanji" type="text">
    </div>
    <div class="auth-field">
      <label for="wle-f-kana">Kana</label>
      <input class="auth-input" id="wle-f-kana" type="text">
    </div>
    <div class="auth-field">
      <label for="wle-f-fr">Traduction française</label>
      <input class="auth-input" id="wle-f-fr" type="text">
    </div>
    <div class="auth-field">
      <label for="wle-f-ex">Phrase d'exemple (japonais)</label>
      <input class="auth-input" id="wle-f-ex" type="text">
    </div>

    <div class="auth-msg hidden" id="wle-modal-msg"></div>

    <div class="modal-actions">
      <button class="btn-primary" id="wle-modal-save">Enregistrer</button>
      <button class="btn-ghost" id="wle-modal-delete">🗑️ Supprimer ce mot</button>
      <button class="btn-ghost" id="wle-modal-cancel">Annuler</button>
    </div>
  </div>
</div>

<!-- Backend (comptes + sync + classement) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>

<!-- Données (variables globales JS) -->
<script src="data/mots_1.json"></script>
<script src="data/mots_2.json"></script>
<script src="data/mots_3.json"></script>
<script src="data/mots_4.json"></script>
<script src="srs.js"></script>
<script src="cloud.js"></script>
<script src="core.js"></script>
<script src="page-wordlist-editor.js"></script>
</body>
</html>
