<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Config · J-Core 2000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Flash feedback -->
<div id="sf" aria-hidden="true"></div>

<!-- Navigation globale (retour + thème) -->
<div class="global-nav">
  <button class="nav-btn back-btn" id="global-back" aria-label="Retour">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn theme-btn" id="theme-toggle" aria-label="Changer le thème">
    <span id="theme-icon">☀️</span>
  </button>
</div>

<div id="app">

  <div class="screen-title" id="cfg-title">Niveau 01</div>
  <div class="screen-sub" id="cfg-sub">500 mots</div>

  <div class="section-label">Difficulté</div>
  <div class="diff-grid">
    <button class="diff-btn active" data-diff="normal">
      <span class="db-icon">🟢</span><span class="db-name">Normal</span><span class="db-info">3 vies · 15s</span>
    </button>
    <button class="diff-btn" data-diff="hard">
      <span class="db-icon">🟠</span><span class="db-name">Hard</span><span class="db-info">2 vies · 10s</span>
    </button>
    <button class="diff-btn" data-diff="blitz">
      <span class="db-icon">🔴</span><span class="db-name">Blitz</span><span class="db-info">1 vie · 6s</span>
    </button>
  </div>

  <div class="section-label">Timer</div>
  <div class="opt-row">
    <div class="or-info">
      <span class="or-label">Chronomètre</span>
      <span class="or-sub" id="timer-hint">Activé — 15s par question</span>
    </div>
    <button class="toggle active" id="timer-toggle" role="switch" aria-checked="true"></button>
  </div>

  <div class="config-actions">
    <button class="btn-primary" id="btn-start-quiz">Démarrer le QCM</button>
    <button class="btn-ghost" id="btn-start-flash-level">🃏 Flashcards ce niveau</button>
    <button class="btn-ghost" id="btn-show-list">📖 Liste des mots</button>
  </div>

</div><!-- /#app -->

<!-- Backend (comptes + sync + classement) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>

<!-- Données (variables globales JS) -->
<script src="data/mots_1.json"></script>
<script src="data/mots_2.json"></script>
<script src="data/mots_3.json"></script>
<script src="data/mots_4.json"></script>
<script src="srs.js"></script>
<script src="cloud.js"></script>
<script src="core.js"></script>
<script src="page-config.js"></script>
</body>
</html>
