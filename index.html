<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Core 2000 | Hiro Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap');

        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-red: #e11d48;
            --accent-red-hover: #be123c;
            --correct-green: #10b981;
            --wrong-red: #ef4444;
            --border-glow: rgba(225, 29, 72, 0.3);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        #app {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 550px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 40px var(--border-glow);
            text-align: center;
            border: 1px solid #27272a;
            position: relative;
            overflow: hidden;
        }

        #app::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
        }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            margin-top: 0; 
            font-size: 2.5rem; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            color: var(--accent-red);
            text-shadow: 0 0 10px var(--border-glow);
            cursor: pointer;
        }

        p.subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 1.1rem; }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-family: 'Orbitron', sans-serif;
        }

        .lives { color: var(--accent-red); letter-spacing: 2px; }
        .score { color: var(--text-muted); }
        .score span { color: var(--text-main); font-weight: bold; }

        .question-container {
            min-height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            background: #0f0f11;
            border-radius: 12px;
            border: 1px solid #27272a;
        }

        .question-text { font-size: 3rem; font-weight: bold; }
        ruby { ruby-align: center; }
        rt { font-size: 1.2rem; color: var(--accent-red); font-weight: normal; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            background-color: #27272a;
            color: var(--text-main);
            border: 1px solid #3f3f46;
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            background-color: #3f3f46;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { cursor: default; }
        
        button.wrong {
            background-color: var(--wrong-red);
            border-color: var(--wrong-red);
            color: white;
            opacity: 0.8;
        }

        button.correct {
            background-color: var(--correct-green);
            border-color: var(--correct-green);
            color: white;
        }

        .menu-btn {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            background-color: transparent;
            border: 2px solid var(--accent-red);
            color: var(--accent-red);
        }

        .menu-btn:hover { 
            background-color: var(--accent-red); 
            color: white; 
        }

        .menu-btn.all-levels { 
            background-color: var(--accent-red); 
            color: white; 
            margin-top: 30px; 
            border: none;
        }
        
        .menu-btn.all-levels:hover { background-color: var(--accent-red-hover); }

        .action-btn { background-color: #27272a; border-color: transparent; color: white; }
        .action-btn.primary { background-color: var(--correct-green); }

        .hidden { display: none !important; }

        #loading { color: var(--accent-red); font-family: 'Orbitron', sans-serif; font-size: 1.5rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Mode Révision */
        #revision-list {
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        #revision-list::-webkit-scrollbar { width: 8px; }
        #revision-list::-webkit-scrollbar-track { background: #0f0f11; border-radius: 4px; }
        #revision-list::-webkit-scrollbar-thumb { background: var(--accent-red); border-radius: 4px; }

        .rev-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #27272a;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-red);
        }

        .rev-jp { font-size: 1.4rem; font-weight: bold; }
        .rev-kana { font-size: 0.9rem; color: var(--text-muted); display: block; }
        .rev-fr { font-size: 1rem; color: #e4e4e7; text-align: right; }

    </style>
</head>
<body>

<div id="app">
    <div id="loading">Démarrage du moteur...</div>

    <div id="menu-screen" class="hidden">
        <h1 id="title-logo">J-CORE 2000</h1>
        <p class="subtitle">Sélectionne ton terrain</p>
        <button class="menu-btn" onclick="selectLevel('1')">Niveau 1 (1-500)</button>
        <button class="menu-btn" onclick="selectLevel('2')">Niveau 2 (501-1000)</button>
        <button class="menu-btn" onclick="selectLevel('3')">Niveau 3 (1001-1500)</button>
        <button class="menu-btn" onclick="selectLevel('4')">Niveau 4 (1501-2000)</button>
        <button class="menu-btn all-levels" onclick="selectLevel('ALL')">DRIFT TOTAL (Les 2000 mots)</button>
    </div>

    <div id="action-screen" class="hidden">
        <h1 id="action-title">NIVEAU X</h1>
        <p class="subtitle">Que veux-tu faire ?</p>
        <button class="menu-btn action-btn primary" onclick="startTest()">Lancer le test</button>
        <button class="menu-btn action-btn" onclick="showRevision()">Mode Révision (Liste)</button>
        <button class="menu-btn action-btn" onclick="goToMenu()" style="margin-top: 20px; background: transparent; border: 1px solid #3f3f46;">Retour</button>
    </div>

    <div id="revision-screen" class="hidden">
        <h1 style="font-size: 1.8rem; margin-bottom: 10px;">RÉVISION</h1>
        <p class="subtitle" id="rev-count">0 mots</p>
        <div id="revision-list"></div>
        <button class="menu-btn action-btn" onclick="goToActionScreen()" style="margin-top: 15px;">Retour</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="header">
            <div class="lives" id="lives-display"></div>
            <div class="score">SCORE: <span id="score-display">0</span></div>
        </div>
        
        <div class="question-container">
            <div class="question-text" id="question-text"></div>
        </div>

        <div class="options-grid" id="options-grid"></div>
    </div>

    <div id="game-over-screen" class="hidden">
        <h1>ÉCHEC</h1>
        <p class="subtitle" id="game-over-quote" style="color: var(--accent-red); font-style: italic;"></p>
        <p style="font-size: 1.2rem; margin-bottom: 30px; color: var(--text-muted);">Mots validés: <span id="final-score" style="color: var(--text-main); font-weight: bold; font-size: 1.8rem; display: block; margin-top: 10px;">0</span></p>
        <button class="menu-btn all-levels" onclick="goToMenu()">Retourner au garage</button>
    </div>
</div>

<script>
    let database = {};
    let currentSelectedLevel = null;
    let currentWordList = [];
    let lives = 3;
    let maxLives = 3;
    let score = 0;
    let currentWord = null;
    let currentOptions = [];
    let isJpToFr = true;
    let showFurigana = false;
    let easterEggClicks = 0;

    const loadingScreen = document.getElementById('loading');
    const menuScreen = document.getElementById('menu-screen');
    const actionScreen = document.getElementById('action-screen');
    const revisionScreen = document.getElementById('revision-screen');
    const gameScreen = document.getElementById('game-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const livesDisplay = document.getElementById('lives-display');
    const scoreDisplay = document.getElementById('score-display');
    const questionText = document.getElementById('question-text');
    const optionsGrid = document.getElementById('options-grid');
    const finalScore = document.getElementById('final-score');
    const gameOverQuote = document.getElementById('game-over-quote');
    const revisionList = document.getElementById('revision-list');

    // EASTER EGG : Click 5 fois sur le titre
    document.getElementById('title-logo').addEventListener('click', () => {
        easterEggClicks++;
        if(easterEggClicks === 5) {
            maxLives = 999;
            alert("⚙️ Mode Shifu activé : Le plein de vies a été fait. Fais fumer les pneus.");
        }
    });

    async function loadDatabase() {
        try {
            const response = await fetch('./mots.json');
            if (!response.ok) throw new Error("Fichier introuvable");
            database = await response.json();
            
            loadingScreen.classList.add('hidden');
            menuScreen.classList.remove('hidden');
        } catch (error) {
            loadingScreen.innerText = "Erreur: mots.json introuvable.";
            console.error(error);
        }
    }

    function selectLevel(level) {
        currentSelectedLevel = level;
        if (level === 'ALL') {
            currentWordList = [].concat(...Object.values(database));
            document.getElementById('action-title').innerText = "DRIFT TOTAL";
        } else {
            currentWordList = database[level];
            document.getElementById('action-title').innerText = "NIVEAU " + level;
        }

        if (!currentWordList || currentWordList.length < 4) {
            alert("Moteur vide. Ajoute des mots dans ce niveau.");
            return;
        }

        menuScreen.classList.add('hidden');
        actionScreen.classList.remove('hidden');
    }

    function showRevision() {
        actionScreen.classList.add('hidden');
        revisionScreen.classList.remove('hidden');
        document.getElementById('rev-count').innerText = currentWordList.length + " mots injectés";
        
        revisionList.innerHTML = '';
        currentWordList.forEach(word => {
            const item = document.createElement('div');
            item.className = 'rev-item';
            item.innerHTML = `
                <div>
                    <span class="rev-jp">${word.kanji}</span>
                    <span class="rev-kana">${word.kana}</span>
                </div>
                <div class="rev-fr">${word.fr}</div>
            `;
            revisionList.appendChild(item);
        });
    }

    function goToActionScreen() {
        revisionScreen.classList.add('hidden');
        actionScreen.classList.remove('hidden');
    }

    function startTest() {
        lives = maxLives;
        score = 0;
        updateUI();
        
        actionScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        nextQuestion();
    }

    function updateUI() {
        if(lives > 5) {
            livesDisplay.innerText = `❤️ x${lives}`;
        } else {
            livesDisplay.innerText = '❤️'.repeat(lives) + '🖤'.repeat(maxLives - lives);
        }
        scoreDisplay.innerText = score;
    }

    function nextQuestion() {
        currentWord = currentWordList[Math.floor(Math.random() * currentWordList.length)];
        let distractors = [];
        while(distractors.length < 3) {
            let randomWord = currentWordList[Math.floor(Math.random() * currentWordList.length)];
            if(randomWord.kanji !== currentWord.kanji && !distractors.includes(randomWord)) {
                distractors.push(randomWord);
            }
        }
        
        currentOptions = [currentWord, ...distractors];
        currentOptions.sort(() => Math.random() - 0.5);
        isJpToFr = Math.random() > 0.5;
        showFurigana = Math.random() > 0.5;
        renderQuestion();
    }

    function renderQuestion() {
        optionsGrid.innerHTML = '';

        if (isJpToFr) {
            if (showFurigana) {
                questionText.innerHTML = `<ruby>${currentWord.kanji}<rt>${currentWord.kana}</rt></ruby>`;
            } else {
                questionText.innerHTML = currentWord.kanji;
            }

            currentOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.innerText = option.fr;
                btn.dataset.isCorrect = (option.kanji === currentWord.kanji);
                btn.onclick = () => checkAnswer(btn, option);
                optionsGrid.appendChild(btn);
            });
        } else {
            questionText.innerHTML = currentWord.fr;

            currentOptions.forEach(option => {
                const btn = document.createElement('button');
                if (showFurigana) {
                    btn.innerHTML = `<ruby>${option.kanji}<rt>${option.kana}</rt></ruby>`;
                } else {
                    btn.innerHTML = option.kanji;
                }
                btn.dataset.isCorrect = (option.kanji === currentWord.kanji);
                btn.onclick = () => checkAnswer(btn, option);
                optionsGrid.appendChild(btn);
            });
        }
    }

    function checkAnswer(btn, selectedOption) {
        if (selectedOption.kanji === currentWord.kanji) {
            btn.classList.add('correct');
            score++;
            
            // Easter egg de score
            if (score === 69) {
                const toast = document.createElement('div');
                toast.innerText = "Nice.";
                toast.style.position = "absolute";
                toast.style.bottom = "20px";
                toast.style.left = "50%";
                toast.style.transform = "translateX(-50%)";
                toast.style.color = "var(--text-muted)";
                document.getElementById('app').appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }
            
            updateUI();
            Array.from(optionsGrid.children).forEach(b => b.disabled = true);
            setTimeout(nextQuestion, 400); 
        } else {
            btn.classList.add('wrong');
            btn.disabled = true; 
            lives--;
            updateUI();

            if (lives <= 0) {
                Array.from(optionsGrid.children).forEach(b => {
                    b.disabled = true;
                    if (b.dataset.isCorrect === "true") {
                        b.classList.add('correct');
                    }
                });
                setTimeout(endGame, 2000);
            }
        }
    }

    function endGame() {
        gameScreen.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        finalScore.innerText = score;

// Génération de la vanne en fonction du score (100 phrases random)
        let selectedQuotes = [];
        if (score <= 5) {
            selectedQuotes = [
                "Même ton Livret Jeune Mozaïc a un meilleur rendement que ton cerveau là.",
                "Yuka vient de bloquer ton numéro. Supprime l'appli.",
                "Ton SNC a crashé plus vite qu'une Intel Arc A770 mal configurée.",
                "Iron 1 sur Valorant, Iron 1 en japonais. Cohérent.",
                "Retourne sur Minecraft, l'expatriation au Japon c'est mort.",
                "Ton projet est aussi vide que la fin de ton Livret A.",
                "Avec ce niveau à Mutsuai-nichidaimae, tu vas juste finir par balayer les rues.",
                "Même les mobs du tuto de Lies of P ont plus de vocabulaire.",
                "Ta Z33 a fini dans le fossé avant même d'avoir mis le contact.",
                "Même en tapant sur le clavier au hasard on fait un meilleur score.",
                "T'as le niveau de japonais d'un PNJ buggé. Fais un effort.",
                "Ton code HTML compile, mais ton cerveau renvoie une erreur 404.",
                "Tu vas te retrouver à demander de l'eau en pointant du doigt comme un bébé.",
                "Yuka a vu ton score, elle a pris un billet pour s'enfuir loin de Fujisawa.",
                "Tu espères survivre au Japon avec ça ? Reste dans ta chambre.",
                "Même les bots sur Valorant esquivent tes games avec ce niveau.",
                "Ta mémoire vive est saturée, va falloir rajouter de la DDR5.",
                "Échec critique du système. Le drift est officiellement annulé.",
                "T'as confondu tes cours de japonais avec un speedrun de l'échec.",
                "Le BUT Info ne te sauvera pas si tu ne sais même pas dire bonjour."
            ];
        } else if (score <= 15) {
            selectedQuotes = [
                "La Z33 a calé au démarrage. Faut réviser mécano.",
                "Bloqué au premier boss de Lies of P hein ?",
                "C'est pas avec ça que tu vas survivre en banlieue de Tokyo.",
                "T'as froissé le pare-choc au premier virage en drift.",
                "Ta RX 9070 XT va sortir avant que tu retiennes un seul kanji.",
                "Tu vas galérer à chanter du Ado en karaoké avec une mémoire pareille.",
                "Le BUT Info te bouffe le cerveau ou c'est juste de la flemme ?",
                "Tu peux juste commander de l'eau au resto. Triste vie.",
                "À ce rythme, tes 10 000€ de budget vont partir dans un traducteur de poche.",
                "Tu confonds encore les hiraganas, avoue le.",
                "Un drift salement raté. Tu as fini dans les poubelles du konbini.",
                "T'as autant de vocabulaire qu'un creep sur Minecraft.",
                "Le refroidissement liquide de ton NZXT marche mieux que tes neurones.",
                "Yuka te lâche un 'vu' froid. C'est mérité.",
                "Même avec un bodykit de malade, ce score reste super moche.",
                "Tu codes mieux en C qu'en japonais.",
                "La licence de japonais, c'est pas pour demain matin.",
                "Ton cerveau throttle, baisse les graphismes et concentre-toi.",
                "T'as glissé sur une peau de banane verbale.",
                "Le mode difficile de la vie t'a rattrapé direct."
            ];
        } else if (score <= 30) {
            selectedQuotes = [
                "Mouais. T'as de quoi acheter un onigiri au konbini, pas plus.",
                "Le moteur chauffe mais t'es encore en rodage.",
                "Pas mal mais tu bégayerais encore sec devant Yuka.",
                "T'es au niveau d'un random touriste perdu au milieu de Shibuya.",
                "Continue de tryhard, tu vas peut-être pouvoir lire la notice de ton bodykit un jour.",
                "T'as esquivé le Game Over total, mais de justesse.",
                "C'est le niveau N5 de la survie en milieu hostile.",
                "Tu peux demander où sont les toilettes. L'essentiel est assuré.",
                "Les 250€ par mois s'accumulent, le cerveau se remplit aussi. Doucement.",

                "Tu chantes un opening d'anime, mais avec un accent claqué au sol.",
                "Encore quelques mois de BUT Info et de révisions, on lâche rien.",

        } else if (score <= 50) {
            selectedQuotes = [
                "Ok tu commences à imprimer les kanjis solidement.",
                "Le swap moteur fait effet, ça drifte proprement dans les virages.",
                "Tu pourras au moins négocier le prix des pièces pour ta Z33 sans te faire arnaquer.",
                "Le grind de l'ombre commence à payer, respect.",
                "Tu vas pouvoir saigner les openings de Yoasobi sans regarder les sous-titres.",
                "T'es devenu le boss de fin de Lies of P.",

                "Yuka commence à te trouver impressionnant. Gère la suite.",
                "Tu mets des têtes sur Valorant et des kanjis dans ta mémoire.",

                "Ton Livret A explose, ton vocabulaire explose. Propre.",
                "Tu driftes les virages serrés de la grammaire avec classe.",

                "Le code mental est propre, pas un seul bug d'expression.",

                "Tu as mis la gomme, la concurrence est loin dans le rétro.",
                "Un vrai étudiant déterminé, l'informatique ça forge un mental d'acier.",
                "L'humour noir passe nickel en japonais maintenant.",
                "Ton cerveau tourne à plein régime, du 6000MT/s minimum."
            ];
        } else {
            selectedQuotes = [
                "Masterclass. T'es prêt pour le vol direction Tokyo.",
                "Yuka prépare déjà le repas, t'as plié le game de la langue.",
                "Le boss de Fujisawa est dans la place. GG Hiro.",
                "Ton cerveau tourne plus vite que ton processeur Ryzen 7 9800X3D.",
                "10 000 balles de côté et un vocabulaire parfait, tu vas rouler sur le pays.",
                "La Nissan Fairlady Z est à toi, tu driftes littéralement sur le dictionnaire.",
                "Même les natifs te demandent des conseils pour leurs propres kanjis.",
                "Score de pur crack. Tu as fumé ce test avec une facilité insolente.",
                "Tu peux direct écrire ton propre light novel sans traducteur.",
                "Ton code source japonais est parfaitement optimisé, zéro fuite de mémoire.",
                "T'as 100% de winrate sur ce niveau. Indécent.",
                "Tu lis les kanjis aussi vite que ton écran rafraîchit les frames sur Valorant.",
                "C'est plus de l'apprentissage là, c'est de la domination.",
                "Le Shifu a largement dépassé le maître.",
                "Mutsuai-nichidaimae tremble devant ton aisance linguistique.",
                "Aucun kanji ne te résiste. Zéro lag de la pensée.",
                "T'es une machine de guerre, l'Intel Arc est jalouse de tes perfs.",
                "Tu as hacké la matrice du Core 2000. Le jeu est à toi.",
                "Ton dictionnaire mental a plus de VRAM que ton PC actuel.",
                "Le niveau est irréprochable. Prépare tes bagages en scred."
            ];
        }

        gameOverQuote.innerText = selectedQuotes[Math.floor(Math.random() * selectedQuotes.length)];
    }

    function goToMenu() {
        gameOverScreen.classList.add('hidden');
        actionScreen.classList.add('hidden');
        revisionScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
    }

    loadDatabase();
</script>

</body>
</html>
