<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Anki · J-Core 2000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Flash feedback -->
<div id="sf" aria-hidden="true"></div>

<!-- Navigation globale (retour + thème) -->
<div class="global-nav">
  <button class="nav-btn back-btn" id="global-back" aria-label="Retour">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-btn theme-btn" id="theme-toggle" aria-label="Changer le thème">
    <span id="theme-icon">☀️</span>
  </button>
</div>

<div id="app">

  <div class="flash-hud">
    <div class="flash-progress-wrap">
      <div class="flash-progress-bar">
        <div class="flash-progress-fill" id="flash-prog-fill"></div>
      </div>
      <div class="flash-progress-text" id="flash-prog-text">1 / 20</div>
    </div>
    <div class="flash-badges">
      <span class="fbadge" id="flash-badge-state">Nouveau</span>
      <span class="fbadge fbadge-level" id="flash-badge-level">Niv. 0</span>
    </div>
  </div>

  <!-- Carte 3D flip -->
  <div class="card-scene" id="card-scene">
    <div class="card-3d" id="flash-card">
      <div class="card-face card-front" id="flash-front">
        <span class="cf-dir" id="cf-dir">JP → FR</span>
        <div class="cf-main" id="cf-main"></div>
        <div class="cf-kana" id="cf-kana"></div>
      </div>
      <div class="card-face card-back" id="flash-back">
        <span class="cb-dir">Réponse</span>
        <div class="cb-answer" id="cb-answer"></div>
        <div class="cb-example" id="cb-example"></div>
      </div>
    </div>
  </div>

  <div class="flash-tip" id="flash-tip">Appuie pour révéler la réponse</div>

  <!-- Boutons d'évaluation (cachés jusqu'au flip) -->
  <div class="rate-grid hidden" id="rate-grid">
    <button class="rate-btn rate-blackout" id="rate-blackout">
      <span class="rb-label">Black-out</span><span class="rb-interval" id="ri-blackout">—</span>
    </button>
    <button class="rate-btn rate-hard" id="rate-hard">
      <span class="rb-label">Difficile</span><span class="rb-interval" id="ri-hard">—</span>
    </button>
    <button class="rate-btn rate-medium" id="rate-medium">
      <span class="rb-label">Moyen</span><span class="rb-interval" id="ri-medium">—</span>
    </button>
    <button class="rate-btn rate-easy" id="rate-easy">
      <span class="rb-label">Facile</span><span class="rb-interval" id="ri-easy">—</span>
    </button>
  </div>

  <div class="flash-keys">Espace = révéler · 1 Black-out · 2 Difficile · 3 Moyen · 4 Facile</div>

</div><!-- /#app -->

<!-- Backend (comptes + sync + classement) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>

<!-- Données (variables globales JS) -->
<script src="data/mots_1.json"></script>
<script src="data/mots_2.json"></script>
<script src="data/mots_3.json"></script>
<script src="data/mots_4.json"></script>
<script src="srs.js"></script>
<script src="cloud.js"></script>
<script src="core.js"></script>
<script src="page-flashcard.js"></script>
</body>
</html>
